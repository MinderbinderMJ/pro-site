<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael J. Dwyer — Page Not Found</title>
    <meta name="robots" content="noindex, follow">
    <link rel="stylesheet" href="/style.css">
    <style>
        .not-found-container {
            text-align: center;
            padding: 80px 30px 60px;
            max-width: 600px;
            margin: 0 auto;
        }
        .not-found-container h1 {
            font-size: 2rem;
            color: #500000;
            margin-bottom: 12px;
            font-weight: 700;
        }
        .not-found-container p {
            font-size: 1.05rem;
            color: #555;
            margin-bottom: 36px;
            line-height: 1.7;
        }
        .not-found-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .not-found-nav a {
            display: inline-block;
            padding: 10px 24px;
            border: 1.5px solid #500000;
            border-radius: 4px;
            color: #500000;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            background-color: #fff;
            transition: all 0.2s ease;
        }
        .not-found-nav a:hover {
            background-color: #500000;
            color: #fff;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            .not-found-container {
                padding: 48px 16px 40px;
            }
            .not-found-container h1 {
                font-size: 1.6rem;
            }
            .not-found-container p {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="site-name"><a href="/index.html">Michael J. Dwyer</a></div>
            <button class="menu-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('open')">&#9776;</button>
            <ul class="nav-links">
                <li><a href="/index.html">About</a></li>
                <li><a href="/research.html">Research</a></li>
                <li><a href="/teaching.html">Teaching</a></li>
                <li><a href="/resources.html">Resources</a></li>
            </ul>
        </div>
    </nav>

    <div class="not-found-container">
        <h1>Page Not Found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Use the links below to navigate to the main sections of the site.</p>
        <div class="not-found-nav">
            <a href="/index.html">About</a>
            <a href="/research.html">Research</a>
            <a href="/teaching.html">Teaching</a>
            <a href="/resources.html">Resources</a>
        </div>
    </div>

    <footer>
        &copy; 2026 Michael J. Dwyer
    </footer>
</body>
</html>
